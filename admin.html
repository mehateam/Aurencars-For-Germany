<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AurenCars Admin</title>
  <style>
    :root {
      --bg:     #08080E;
      --s1:     #101018;
      --s2:     #17171F;
      --s3:     #222230;
      --gold:   #C4922A;
      --goldl:  #DFB054;
      --goldg:  rgba(196,146,42,.15);
      --text:   #EAE6DC;
      --muted:  #6B6860;
      --border: rgba(196,146,42,.12);
      --red:    #e05252;
      --green:  #52a873;
      --fd: 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--fd); font-size: 14px; line-height: 1.5; }
    a { color: var(--gold); text-decoration: none; }
    button { cursor: pointer; font-family: inherit; font-size: inherit; border: none; }
    input, select, textarea { font-family: inherit; font-size: inherit; }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      padding: 48px 40px;
      background: var(--s1);
      border: 1px solid var(--border);
    }
    .login-logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .login-logo span { color: var(--gold); }
    .login-sub { color: var(--muted); font-size: .82rem; margin-bottom: 32px; }
    .login-box .fg { margin-bottom: 20px; }
    .login-box label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .login-box input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      padding: 12px 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box input::placeholder { color: var(--muted); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #000;
      font-weight: 600;
      font-size: .88rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: background .2s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--goldl); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .login-err {
      color: var(--red);
      font-size: .78rem;
      margin-top: 12px;
      display: none;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; min-height: 100vh; }
    .dash-header {
      position: sticky;
      top: 0;
      background: rgba(8,8,14,.97);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }
    .dash-logo { font-size: 1.1rem; font-weight: 700; }
    .dash-logo span { color: var(--gold); }
    .dash-logo small { color: var(--muted); font-size: .7rem; font-weight: 400; margin-left: 8px; }
    .dash-actions { display: flex; align-items: center; gap: 12px; }
    .btn-add {
      background: var(--gold);
      color: #000;
      font-weight: 600;
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 9px 20px;
      transition: background .2s;
    }
    .btn-add:hover { background: var(--goldl); }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .78rem;
      padding: 8px 16px;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    .dash-body { padding: 32px; }
    .dash-title {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }
    #vehicleCount { color: var(--gold); margin-left: 8px; }

    /* ── VEHICLE GRID ── */
    #adminGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2px;
    }
    .admin-card {
      background: var(--s1);
      overflow: hidden;
      border-left: 2px solid transparent;
      transition: border-color .25s;
    }
    .admin-card:hover { border-left-color: var(--gold); }
    .admin-card-thumb {
      aspect-ratio: 16/9;
      background: var(--s2);
      overflow: hidden;
    }
    .admin-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .admin-card-nophoto {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .15em;
    }
    .admin-card-info { padding: 14px 16px 10px; }
    .admin-card-name { font-weight: 600; font-size: .95rem; margin-bottom: 3px; }
    .admin-card-meta { color: var(--muted); font-size: .78rem; }
    .admin-card-btns {
      display: flex;
      gap: 2px;
      padding: 0 16px 14px;
    }
    .btn-edit {
      flex: 1;
      padding: 7px;
      background: var(--s2);
      color: var(--text);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .btn-edit:hover { border-color: var(--gold); color: var(--gold); }
    .btn-del {
      flex: 1;
      padding: 7px;
      background: transparent;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .btn-del:hover { border-color: var(--red); color: var(--red); }

    .empty-state {
      grid-column: 1/-1;
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state p { margin-top: 8px; font-size: .85rem; }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 500;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 32px 16px;
    }
    #modal.open { display: flex; }
    .modal-box {
      background: var(--s1);
      width: 100%;
      max-width: 680px;
      border: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .modal-close {
      background: none;
      color: var(--muted);
      font-size: 1.4rem;
      line-height: 1;
      padding: 4px 8px;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 28px; }
    .modal-section {
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .modal-section-title {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .fg { margin-bottom: 18px; }
    .fg:last-child { margin-bottom: 0; }
    .fg label {
      display: block;
      font-size: .66rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .fg input, .fg select, .fg textarea {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      padding: 10px 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--gold); }
    .fg input::placeholder, .fg textarea::placeholder { color: var(--s3); }
    .fg select option { background: var(--s2); }
    .fg textarea { resize: vertical; min-height: 90px; }
    .fg-full { grid-column: 1 / -1; }

    /* Categories checkboxes */
    .cat-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .cat-check {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--s2);
      cursor: pointer;
      transition: all .2s;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cat-check input { width: 13px; height: 13px; accent-color: var(--gold); cursor: pointer; }
    .cat-check:has(input:checked) { border-color: var(--gold); color: var(--gold); background: var(--goldg); }

    /* Photo upload */
    .drop-zone {
      border: 1px dashed rgba(196,146,42,.3);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 14px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--gold); background: var(--goldg); }
    .drop-zone-icon { font-size: 1.6rem; margin-bottom: 6px; opacity: .5; }
    .drop-zone-txt { color: var(--muted); font-size: .8rem; }
    .drop-zone-txt span { color: var(--gold); }
    .drop-zone input[type="file"] { display: none; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
    }
    .photo-thumb {
      position: relative;
      aspect-ratio: 1;
      background: var(--s2);
      overflow: hidden;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb-remove {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(0,0,0,.75);
      color: #fff;
      border: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      font-size: .8rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s;
    }
    .photo-thumb-remove:hover { background: var(--red); }

    /* Modal footer */
    .modal-foot {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .btn-save {
      background: var(--gold);
      color: #000;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 12px 32px;
      transition: background .2s;
    }
    .btn-save:hover { background: var(--goldl); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .78rem;
      padding: 11px 20px;
      transition: all .2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-delete-vehicle {
      background: transparent;
      border: 1px solid rgba(224,82,82,.3);
      color: var(--red);
      font-size: .72rem;
      padding: 10px 16px;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: all .2s;
    }
    .btn-delete-vehicle:hover { background: rgba(224,82,82,.1); border-color: var(--red); }

    /* Status toast */
    #statusToast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 14px 22px;
      font-size: .82rem;
      font-weight: 500;
      z-index: 9999;
      transform: translateX(120%);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      max-width: 320px;
    }
    #statusToast.show { transform: translateX(0); }
    #statusToast.success { background: var(--green); color: #000; }
    #statusToast.error { background: var(--red); color: #fff; }

    /* Upload progress */
    .upload-progress {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 8px;
      display: none;
    }
    .upload-progress.show { display: block; }

    @media (max-width: 640px) {
      .dash-body { padding: 16px; }
      .modal-body { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .dash-header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Auren<span>Cars</span></div>
    <div class="login-sub">Admin panel</div>
    <form id="loginForm">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" required autocomplete="email">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <header class="dash-header">
    <div class="dash-logo">Auren<span>Cars</span> <small>ADMIN</small></div>
    <div class="dash-actions">
      <button class="btn-add" onclick="openForm()">+ Add vehicle</button>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </header>
  <div class="dash-body">
    <div class="dash-title">Vehicles <span id="vehicleCount"></span></div>
    <div id="adminGrid">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<!-- ── MODAL ── -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Add vehicle</div>
      <button class="modal-close" onclick="closeForm()">×</button>
    </div>
    <div class="modal-body">

      <!-- Basic info -->
      <div class="modal-section">
        <div class="modal-section-title">Vehicle info</div>
        <div class="form-row">
          <div class="fg">
            <label>Car name / model *</label>
            <input type="text" id="fName" placeholder="Genesis GV80" required>
          </div>
          <div class="fg">
            <label>Year *</label>
            <input type="number" id="fYear" placeholder="2025" min="1980" max="2030">
          </div>
          <div class="fg">
            <label>Mileage</label>
            <input type="text" id="fMileage" placeholder="5 000 km · New">
          </div>
          <div class="fg">
            <label>Condition</label>
            <select id="fCondition">
              <option value="New">New</option>
              <option value="Used" selected>Used</option>
              <option value="Certified Pre-owned">Certified Pre-owned</option>
            </select>
          </div>
          <div class="fg fg-full">
            <label>Spec line</label>
            <input type="text" id="fSpec" placeholder="3.5T V6 · AWD · South Korea">
          </div>
          <div class="fg">
            <label>Badge label</label>
            <input type="text" id="fBadge" placeholder="2025 · NEW · HOT">
          </div>
          <div class="fg">
            <label>Price</label>
            <input type="text" id="fPrice" placeholder="€35 000 · Price on request">
          </div>
        </div>
        <div class="fg" style="margin-top:4px">
          <label>Categories</label>
          <div class="cat-checks">
            <label class="cat-check"><input type="checkbox" value="sedan" id="cSed"> Sedan</label>
            <label class="cat-check"><input type="checkbox" value="suv" id="cSuv"> SUV</label>
            <label class="cat-check"><input type="checkbox" value="electric" id="cEl"> Electric</label>
            <label class="cat-check"><input type="checkbox" value="premium" id="cPrem"> Premium</label>
          </div>
        </div>
      </div>

      <!-- Photos -->
      <div class="modal-section">
        <div class="modal-section-title">Photos</div>
        <div class="drop-zone" id="photoDropZone">
          <div class="drop-zone-icon">📷</div>
          <div class="drop-zone-txt">Drag photos here or <span>click to select</span></div>
          <input type="file" id="photoInput" multiple accept="image/*">
        </div>
        <div class="photo-grid" id="photoPreview"></div>
        <div class="upload-progress" id="photoProgress">Uploading photos...</div>
      </div>

      <!-- Insurance history -->
      <div class="modal-section">
        <div class="modal-section-title">Insurance history</div>
        <div class="fg">
          <label>Notes</label>
          <textarea id="fInsNotes" placeholder="Service history, number of owners, accident records, inspection dates..."></textarea>
        </div>
        <div class="fg" style="margin-top:8px">
          <label>Insurance photos / documents</label>
        </div>
        <div class="drop-zone" id="insDropZone">
          <div class="drop-zone-icon">📄</div>
          <div class="drop-zone-txt">Drag files here or <span>click to select</span></div>
          <input type="file" id="insInput" multiple accept="image/*">
        </div>
        <div class="photo-grid" id="insPreview"></div>
        <div class="upload-progress" id="insProgress">Uploading documents...</div>
      </div>

    </div>
    <div class="modal-foot">
      <button class="btn-delete-vehicle" id="deleteVehicleBtn" onclick="deleteCurrentVehicle()" style="display:none">Delete vehicle</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
        <button class="btn-save" id="saveBtn" onclick="saveVehicle()">Save vehicle</button>
      </div>
    </div>
  </div>
</div>

<div id="statusToast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const db      = firebase.firestore();
const storage = firebase.storage();
const auth    = firebase.auth();

// ── State ──
let editingId         = null;
let newPhotoFiles     = [];
let keptPhotoUrls     = [];
let newInsPhotoFiles  = [];
let keptInsPhotoUrls  = [];

// ── Auth ──
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadVehicles();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }
});

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.style.display = 'none';
  try {
    await auth.signInWithEmailAndPassword(
      document.getElementById('loginEmail').value.trim(),
      document.getElementById('loginPass').value
    );
  } catch (ex) {
    err.textContent = 'Wrong email or password.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

function logout() {
  auth.signOut();
}

// ── Load vehicles ──
async function loadVehicles() {
  const grid = document.getElementById('adminGrid');
  grid.innerHTML = '<div class="empty-state">Loading...</div>';
  try {
    const snap = await db.collection('vehicles').orderBy('order').get();
    document.getElementById('vehicleCount').textContent = `(${snap.size})`;
    if (snap.empty) {
      grid.innerHTML = '<div class="empty-state"><strong style="color:var(--text)">No vehicles yet</strong><p>Click "+ Add vehicle" to get started.</p></div>';
      return;
    }
    grid.innerHTML = '';
    snap.forEach(doc => grid.appendChild(buildAdminCard(doc.id, doc.data())));
  } catch (ex) {
    grid.innerHTML = `<div class="empty-state" style="color:var(--red)">Error loading vehicles.<br><small>${ex.message}</small></div>`;
  }
}

function buildAdminCard(id, v) {
  const el = document.createElement('div');
  el.className = 'admin-card';
  const thumb = v.photos && v.photos[0]
    ? `<img src="${v.photos[0]}" alt="${v.name}" loading="lazy">`
    : `<div class="admin-card-nophoto">NO PHOTO</div>`;
  const cats = (v.categories || []).map(c => c.toUpperCase()).join(' · ');
  el.innerHTML = `
    <div class="admin-card-thumb">${thumb}</div>
    <div class="admin-card-info">
      <div class="admin-card-name">${v.name || '—'}</div>
      <div class="admin-card-meta">${v.year || ''} · ${v.condition || ''} ${cats ? '· ' + cats : ''}</div>
    </div>
    <div class="admin-card-btns">
      <button class="btn-edit" onclick="openForm('${id}')">Edit</button>
      <button class="btn-del" onclick="deleteVehicle('${id}', '${(v.name||'').replace(/'/g,"\\'")}')">Delete</button>
    </div>
  `;
  return el;
}

// ── Form open/close ──
function openForm(id) {
  resetForm();
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit vehicle' : 'Add vehicle';
  document.getElementById('deleteVehicleBtn').style.display = id ? 'block' : 'none';
  if (id) loadVehicleIntoForm(id);
  document.getElementById('modal').classList.add('open');
}

function closeForm() {
  document.getElementById('modal').classList.remove('open');
  resetForm();
}

function resetForm() {
  editingId = null;
  newPhotoFiles = [];
  keptPhotoUrls = [];
  newInsPhotoFiles = [];
  keptInsPhotoUrls = [];
  ['fName','fYear','fMileage','fSpec','fBadge','fPrice','fInsNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fCondition').value = 'Used';
  ['cSed','cSuv','cEl','cPrem'].forEach(id => {
    document.getElementById(id).checked = false;
  });
  renderPhotoPreviews();
  renderInsPreviews();
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = 'Save vehicle';
}

async function loadVehicleIntoForm(id) {
  const doc = await db.collection('vehicles').doc(id).get();
  if (!doc.exists) return;
  const v = doc.data();
  document.getElementById('fName').value      = v.name || '';
  document.getElementById('fYear').value      = v.year || '';
  document.getElementById('fMileage').value   = v.mileage || '';
  document.getElementById('fCondition').value = v.condition || 'Used';
  document.getElementById('fSpec').value      = v.spec || '';
  document.getElementById('fBadge').value     = v.badge || '';
  document.getElementById('fPrice').value     = v.price || '';
  document.getElementById('fInsNotes').value  = v.insurance?.notes || '';
  (v.categories || []).forEach(cat => {
    const map = { sedan:'cSed', suv:'cSuv', electric:'cEl', premium:'cPrem' };
    if (map[cat]) document.getElementById(map[cat]).checked = true;
  });
  keptPhotoUrls    = [...(v.photos || [])];
  keptInsPhotoUrls = [...(v.insurance?.photos || [])];
  renderPhotoPreviews();
  renderInsPreviews();
}

// ── Photo handling ──
function renderPhotoPreviews() {
  const box = document.getElementById('photoPreview');
  box.innerHTML = '';
  keptPhotoUrls.forEach((url, i) => box.appendChild(makeThumb(url, () => { keptPhotoUrls.splice(i,1); renderPhotoPreviews(); })));
  newPhotoFiles.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    box.appendChild(makeThumb(url, () => { newPhotoFiles.splice(i,1); renderPhotoPreviews(); }));
  });
}

function renderInsPreviews() {
  const box = document.getElementById('insPreview');
  box.innerHTML = '';
  keptInsPhotoUrls.forEach((url, i) => box.appendChild(makeThumb(url, () => { keptInsPhotoUrls.splice(i,1); renderInsPreviews(); })));
  newInsPhotoFiles.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    box.appendChild(makeThumb(url, () => { newInsPhotoFiles.splice(i,1); renderInsPreviews(); }));
  });
}

function makeThumb(src, onRemove) {
  const div = document.createElement('div');
  div.className = 'photo-thumb';
  div.innerHTML = `<img src="${src}"><button class="photo-thumb-remove" title="Remove">×</button>`;
  div.querySelector('.photo-thumb-remove').addEventListener('click', onRemove);
  return div;
}

function setupDropZone(zoneId, inputId, filesArray, renderFn) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  zone.addEventListener('click', () => input.click());
  input.addEventListener('change', () => { [...input.files].forEach(f => filesArray.push(f)); renderFn(); input.value=''; });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    [...e.dataTransfer.files].filter(f => f.type.startsWith('image/')).forEach(f => filesArray.push(f));
    renderFn();
  });
}

setupDropZone('photoDropZone', 'photoInput', newPhotoFiles, renderPhotoPreviews);
setupDropZone('insDropZone', 'insInput', newInsPhotoFiles, renderInsPreviews);

// ── Upload files to Storage ──
async function uploadFiles(files, prefix) {
  const urls = [];
  for (const file of files) {
    const safeName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const ref = storage.ref(`${prefix}/${safeName}`);
    await ref.put(file);
    urls.push(await ref.getDownloadURL());
  }
  return urls;
}

// ── Save vehicle ──
async function saveVehicle() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Car name is required.', 'error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    // Upload new photos
    if (newPhotoFiles.length) {
      document.getElementById('photoProgress').classList.add('show');
      btn.textContent = 'Uploading photos...';
    }
    const newUrls = await uploadFiles(newPhotoFiles, 'vehicles');
    document.getElementById('photoProgress').classList.remove('show');

    // Upload new insurance photos
    if (newInsPhotoFiles.length) {
      document.getElementById('insProgress').classList.add('show');
      btn.textContent = 'Uploading documents...';
    }
    const newInsUrls = await uploadFiles(newInsPhotoFiles, 'insurance');
    document.getElementById('insProgress').classList.remove('show');

    btn.textContent = 'Saving...';

    const categories = ['sedan','suv','electric','premium'].filter(cat => {
      const map = { sedan:'cSed', suv:'cSuv', electric:'cEl', premium:'cPrem' };
      return document.getElementById(map[cat]).checked;
    });

    const data = {
      name,
      year:       document.getElementById('fYear').value.trim(),
      mileage:    document.getElementById('fMileage').value.trim(),
      condition:  document.getElementById('fCondition').value,
      spec:       document.getElementById('fSpec').value.trim(),
      badge:      document.getElementById('fBadge').value.trim(),
      price:      document.getElementById('fPrice').value.trim(),
      categories,
      photos:     [...keptPhotoUrls, ...newUrls],
      insurance: {
        notes:  document.getElementById('fInsNotes').value.trim(),
        photos: [...keptInsPhotoUrls, ...newInsUrls],
      },
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };

    if (editingId) {
      await db.collection('vehicles').doc(editingId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      data.order     = Date.now();
      await db.collection('vehicles').add(data);
    }

    closeForm();
    loadVehicles();
    showToast(editingId ? 'Vehicle updated.' : 'Vehicle added.', 'success');
  } catch (ex) {
    showToast('Error: ' + ex.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Save vehicle';
  }
}

// ── Delete ──
function deleteCurrentVehicle() {
  if (editingId) deleteVehicle(editingId, document.getElementById('fName').value);
}

async function deleteVehicle(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await db.collection('vehicles').doc(id).delete();
    closeForm();
    loadVehicles();
    showToast('Vehicle deleted.', 'success');
  } catch (ex) {
    showToast('Error: ' + ex.message, 'error');
  }
}

// ── Toast ──
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('statusToast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3500);
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeForm();
});
</script>
